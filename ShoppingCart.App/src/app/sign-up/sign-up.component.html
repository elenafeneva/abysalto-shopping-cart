<div class="p-d-flex" style="height:100vh; display:flex; justify-content:center; align-items:center;">
  <p-card
    [style]="{ width: '25rem', overflow: 'hidden', display: 'flex', 'justify-content': 'center', 'align-items': 'center' }">
    <ng-template pTemplate="title">Abysalto Shopping App</ng-template>
    <ng-template pTemplate="subtitle"> Sign Up
      <div style="display: flex; justify-content: center; padding-top: 2rem;">
        <i class="pi pi-shopping-bag" style="font-size: 5.5rem; color: #4b5563;"></i>
      </div>
    </ng-template>
    <form [formGroup]="signUpForm" (ngSubmit)="onSubmit()"
      style="display: flex; flex-direction: column; align-items: center; width: 100%;">
      <div style="width: 90%; max-width: 350px; margin-bottom: 1rem;">
        <span class="p-input-icon-left" style="width: 100%;">
          <i class="pi pi-user"></i>
          <input pInputText id="firstName" type="text" formControlName="firstName" placeholder="First Name"
            style="width: 100%;" />
        </span>
        <div *ngIf="signUpForm.get('firstName')?.touched && signUpForm.get('firstName')?.invalid" style="color:red">
          <small *ngIf="signUpForm.get('firstName')?.errors?.['required']">First name is required.</small>
        </div>
      </div>
      <div style="width: 90%; max-width: 350px; margin-bottom: 1rem;">
        <span class="p-input-icon-left" style="width: 100%;">
          <i class="pi pi-user"></i>
          <input pInputText id="lastName" type="text" formControlName="lastName" placeholder="Last Name"
            style="width: 100%;" />
        </span>
        <div *ngIf="signUpForm.get('lastName')?.touched && signUpForm.get('lastName')?.invalid" style="color:red">
          <small *ngIf="signUpForm.get('lastName')?.errors?.['required']">Last name is required.</small>
        </div>
      </div>
      <div style="width: 90%; max-width: 350px; margin-bottom: 1rem;">
        <span class="p-input-icon-left" style="width: 100%;">
          <i class="pi pi-envelope"></i>
          <input pInputText id="email" type="text" formControlName="email" placeholder="Email" style="width: 100%;" />
        </span>
        <div *ngIf="signUpForm.get('email')?.touched && signUpForm.get('email')?.invalid" style="color:red">
          <small *ngIf="signUpForm.get('email')?.errors?.['required']">Email is required.</small>
          <small *ngIf="signUpForm.get('email')?.errors?.['email']">Enter a valid email.</small>
        </div>
      </div>
      <div style="width: 90%; max-width: 350px; margin-bottom: 1rem;">
        <span class="p-input-icon-left" style="width: 100%;">
          <i class="pi pi-lock"></i>
          <p-password id="password" type="password" formControlName="password" placeholder="Password"
            [autocomplete]="'off'" [style]="{ width: '100%' }" />
        </span>
        <div *ngIf="signUpForm.get('password')?.touched && signUpForm.get('password')?.invalid" style="color:red">
          <small *ngIf="signUpForm.get('password')?.errors?.['required']">Password is required.</small>
          <small *ngIf="signUpForm.get('password')?.errors?.['minlength']">Password must be at least 6
            characters.</small>
        </div>
      </div>
      <div style="width: 90%; max-width: 350px; margin-bottom: 1rem;">
        <span class="p-input-icon-left" style="width: 100%;">
          <i class="pi pi-lock"></i>
          <p-password id="confirmPassword" type="password" formControlName="confirmPassword"
            placeholder="Confirm Password" [autocomplete]="'off'" [style]="{ width: '100%' }" />
        </span>
        <div *ngIf="signUpForm.get('confirmPassword')?.touched && signUpForm.get('confirmPassword')?.invalid"
          style="color:red">
          <small *ngIf="signUpForm.get('confirmPassword')?.errors?.['required']">Please re-enter your password.</small>
          <small *ngIf="signUpForm.get('confirmPassword')?.touched && signUpForm.errors?.['passwordMismatch']"
            style="color:red">
            <small>Passwords do not match.</small>
          </small>
        </div>
      </div>
      <div style="width: 90%; max-width: 350px; margin-bottom: 1rem; text-align: center;">
        <p *ngIf="errorMessage" style="color: red; margin-top: 1rem;">{{ errorMessage }}</p>
      </div>
      <div style="width: 90%; max-width: 350px; margin-bottom: 1rem; text-align: center;">
        <p-button type="submit" [disabled]="signUpForm.invalid || loading" [label]="loading ? 'Signing up…' : 'Sign Up'"
          [style]="{ width: '100%' }" />
      </div>
      <a routerLink="/sign-in">Already have an account? Sign In</a>
    </form>
  </p-card>
</div>
