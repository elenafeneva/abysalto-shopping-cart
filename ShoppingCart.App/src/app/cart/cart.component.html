<div class="card p-4">
    <h2 class="text-2xl font-bold mb-4">Your Shopping Cart</h2>

    <p-table [value]="cartProducts" responsiveLayout="scroll">
        <ng-template pTemplate="header">
            <tr>
                <th style="width: 100px">Image</th>
                <th>Product</th>
                <th>Price</th>
                <th>Quantity</th>
                <th>Subtotal</th>
                <th style="width: 80px"></th>
            </tr>
        </ng-template>

        <ng-template pTemplate="body" let-item>
            <tr>
                <td>
                    <img [src]="item.images[0]" [alt]="item.title" width="60" class="shadow-2 border-round" />
                </td>
                <td class="font-semibold">{{ item.title }}</td>
                <td>{{ item.price | currency }}</td>
                <td>
                    {{ item.quantity }}
                </td>
                <td class="font-bold text-primary">
                    {{ (item.price * item.quantity) | currency }}
                </td>
                <td>
                    <p-button 
                        icon="pi pi-trash" 
                        severity="danger" 
                        [text]="true" 
                        [rounded]="true" 
                        (onClick)="removeItem(item)"
                        pTooltip="Remove item">
                    </p-button>
                </td>
            </tr>
        </ng-template>

        <ng-template pTemplate="footer">
            <tr>
                <td colspan="4" class="text-right font-bold text-xl">Total:</td>
                <td colspan="2" class="text-xl font-bold text-primary">{{ totalAmount | currency }}</td>
            </tr>
        </ng-template>
    </p-table>

    <div class="flex justify-content-end mt-4 gap-3">
        <p-button label="Continue Shopping" icon="pi pi-arrow-left" severity="secondary" [outlined]="true" routerLink="/products"></p-button>
    </div>
</div>
