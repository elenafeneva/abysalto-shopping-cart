<div class="p-d-flex" style="height:100vh; display:flex; justify-content:center; align-items:center;">
  <p-card [style]="{ width: '25rem', overflow: 'hidden', display: 'flex', 'justify-content': 'center', 'align-items': 'center' }">
    <ng-template #header>
      <img src="assets/shopping-cart.png" alt="Logo" width="400" class="mb-2" />
    </ng-template>
    <ng-template #title>Abysalto Shopping App</ng-template>
    <ng-template #subtitle> Sign In </ng-template>
    <form [formGroup]="signInForm" (ngSubmit)="onSubmit()" style="display: flex; flex-direction: column; align-items: center; width: 100%;">
      <div style="width: 90%; max-width: 350px; margin-bottom: 1rem;">
        <span class="p-input-icon-left" style="width: 100%;">
          <i class="pi pi-envelope"></i>
          <input pInputText id="email" type="email" formControlName="email" placeholder="Email" style="width: 100%;" />
        </span>
        <div *ngIf="signInForm.get('email')?.touched && signInForm.get('email')?.invalid" style="color:red">
          <small *ngIf="signInForm.get('email')?.errors?.['required']">Email is required.</small>
          <small *ngIf="signInForm.get('email')?.errors?.['email']">Enter a valid email.</small>
        </div>
      </div>
      <div style="width: 90%; max-width: 350px; margin-bottom: 1rem;">
        <span class="p-input-icon-left" style="width: 100%;">
          <i class="pi pi-lock"></i>
          <input pInputText id="password" type="password" formControlName="password" placeholder="Password" style="width: 100%;" />
        </span>
        <div *ngIf="signInForm.get('password')?.touched && signInForm.get('password')?.invalid" style="color:red">
          <small *ngIf="signInForm.get('password')?.errors?.['required']">Password is required.</small>
          <small *ngIf="signInForm.get('password')?.errors?.['minlength']">Password must be at least 6 characters.</small>
        </div>
      </div>
      <div style="width: 90%; max-width: 350px; margin-bottom: 1rem; text-align: center;">
        <p *ngIf="errorMessage" style="color: red; margin-top: 1rem;">{{ errorMessage }}</p>
      </div>
      <div style="width: 90%; max-width: 350px; margin-bottom: 1rem; text-align: center;">
        <p-button type="submit" [disabled]="signInForm.invalid || loading" [label]="loading ? 'Signing in…' : 'Sign In'" [style]="{ width: '100%' }" />
      </div>
      <a routerLink="/sign-up">Sign Up</a>
    </form>
  </p-card>
</div>
